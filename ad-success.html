<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ad Booked — Melanin Network</title>
<link rel="stylesheet" href="style.css"/>
<style>
body{background:var(--white);display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:var(--font)}
.box{max-width:480px;width:90%;text-align:center;padding:40px 24px}
.icon{font-size:3.5rem;margin-bottom:16px}
h1{font-size:1.5rem;font-weight:800;margin-bottom:10px}
p{color:var(--muted);font-size:0.9rem;line-height:1.6;margin-bottom:24px}
.btn{display:inline-block;background:var(--mn-grad);color:#fff;padding:14px 32px;border-radius:12px;font-weight:700;text-decoration:none;font-size:0.95rem}
</style>
</head>
<body>
<div class="box">
  <div class="icon">🎉</div>
  <h1>Your ad is booked!</h1>
  <p>Payment received. Your campaign is under review and will go live within 2 hours.<br/>We'll email you a confirmation shortly.</p>
  <a href="/" class="btn">Back to Melanin Network</a>
</div>
</body>
</html>
